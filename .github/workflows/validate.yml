name: Validate Providers

on:
  pull_request:
    paths:
      - 'providers/**'
      - 'core/**'
      - 'tests/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run skeleton tests
        run: python tests/test_skeleton.py
      - name: Run provider contract tests
        run: python tests/test_provider_contract.py
      - name: Run runtime tests
        run: python tests/test_runtime.py
      - name: Validate providers
        run: python tests/validate_provider.py
